name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Check directory structure
        run: ls -la && echo "---" && ls -la SourceCode/

      - name: Install dependencies
        working-directory: ./SourceCode
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "Current directory: $(pwd)"
          echo "Package files:"
          ls -la package.json package-lock.json 2>/dev/null || echo "Package files not found"
          echo "Installing dependencies..."
          npm install
          echo "✅ Dependencies installed successfully"
          echo "Checking node_modules..."
          ls -la node_modules/.bin/ | head -20
          echo "Checking if vite is installed..."
          if [ -f "./node_modules/.bin/vite" ]; then
            ./node_modules/.bin/vite --version
            echo "✅ Vite is ready"
          else
            echo "❌ Vite not found in node_modules"
            echo "Available binaries:"
            ls node_modules/.bin/ || echo "No .bin directory"
            exit 1
          fi

      - name: Build
        run: |
          cd SourceCode
          npm run build

      - name: Create .nojekyll file
        run: touch SourceCode/dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./SourceCode/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
