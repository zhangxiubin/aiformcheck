name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Check directory structure
        run: ls -la && echo "---" && ls -la SourceCode/

      - name: Install dependencies
        run: |
          cd SourceCode
          npm install
          echo "Checking if vite is installed..."
          npx vite --version || echo "Vite not found in npx"
          ./node_modules/.bin/vite --version || echo "Vite not found in node_modules"

      - name: Build
        run: |
          cd SourceCode
          npm run build

      - name: Create .nojekyll file
        run: touch SourceCode/dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./SourceCode/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
